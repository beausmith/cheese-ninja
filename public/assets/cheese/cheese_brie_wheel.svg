<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Brie small wheel (low cylinder) -->
  <!-- side -->
  <path d="M44 124 V150 Q44 184 128 184 Q212 184 212 150 V124 Z"
        fill="#ECE4CC" stroke="#CDC3A4" stroke-width="6" stroke-linejoin="round"/>
  <!-- top rind -->
  <ellipse cx="128" cy="124" rx="84" ry="40" fill="#F6F1E2" stroke="#CDC3A4" stroke-width="6"/>
  <!-- soft creamy interior -->
  <ellipse cx="128" cy="124" rx="58" ry="25" fill="#F1E7C4" opacity="0.55"/>
  <!-- highlight -->
  <path d="M84 108 A84 40 0 0 1 150 100" fill="none" stroke="#FFFFFF"
        stroke-width="8" stroke-linecap="round" opacity="0.6"/>
</svg>
